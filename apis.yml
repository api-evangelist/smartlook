aid: smartlook
name: Smartlook
description: >
  Smartlook is a product analytics and session recording platform that helps
  businesses understand how users interact with their web and mobile applications.
  The platform offers a REST API for programmatically accessing session replays,
  heatmaps, funnel analysis, event analytics, and visitor behavior insights. Developers
  can retrieve data across four primary resources—Visitors, Events, Funnels, and
  Sessions—using bearer token authentication against regional API endpoints. Smartlook
  supports multiple data regions and provides SDK integrations for web, iOS, Android,
  and cross-platform frameworks including Cordova and React Native.
