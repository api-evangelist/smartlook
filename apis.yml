apis:
  - name: Smartlook REST API
    description: >
      The Smartlook REST API provides programmatic access to product analytics data
      including visitors, events, funnels, and session recordings. It supports bearer
      token authentication, cursor-based pagination, and regional endpoints to comply
      with data residency requirements. Rate limits vary by subscription plan, ranging
      from 20 requests per hour on the Free plan to 1,000 requests per hour with the
      REST API add-on.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
